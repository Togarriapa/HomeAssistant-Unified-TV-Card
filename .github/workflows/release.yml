name: Publish release

on:
  push:
    branches: [main]
    paths:
      - HomeAssistant-Unified-TV-Card.js
      - package.json
      - CHANGELOG.md
      - hacs.json
      - .github/workflows/release.yml
  schedule:
    - cron: "41 3 * * *"
  workflow_dispatch:

concurrency:
  group: publish-unified-tv-card-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify version consistency
        id: version
        run: |
          node <<'JS' >> "$GITHUB_OUTPUT"
          const fs = require('fs');
          const packageData = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const hacs = JSON.parse(fs.readFileSync('hacs.json', 'utf8'));
          const source = fs.readFileSync('HomeAssistant-Unified-TV-Card.js', 'utf8');
          const sourceMatch = source.match(/^const CARD_VERSION = "([0-9]+\.[0-9]+\.[0-9]+)";/m);
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const heading = changelog.match(/^## ([0-9]+\.[0-9]+\.[0-9]+)$/m);
          if (!sourceMatch || !heading) throw new Error('Version metadata is incomplete');
          const versions = new Set([packageData.version, sourceMatch[1], heading[1]]);
          if (versions.size !== 1) {
            throw new Error(`Version mismatch: ${[...versions].join(', ')}`);
          }
          if (hacs.filename !== 'HomeAssistant-Unified-TV-Card.js') {
            throw new Error(`Unexpected HACS filename: ${hacs.filename}`);
          }
          console.log(`version=${packageData.version}`);
          console.log(`tag=v${packageData.version}`);
          console.log(`asset=${hacs.filename}`);
          JS

      - name: Build release notes
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          awk -v version="$VERSION" '
            $0 == "## " version {flag=1; next}
            /^## / && flag {exit}
            flag
          ' CHANGELOG.md > release-notes.md
          if [[ ! -s release-notes.md ]]; then
            printf 'Unified TV Card %s\n' "$VERSION" > release-notes.md
          fi

      - name: Create or repair latest GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Unified TV Card ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: ${{ steps.version.outputs.asset }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true

      - name: Verify published release asset
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          ASSET: ${{ steps.version.outputs.asset }}
        run: |
          set -euo pipefail
          test "$(gh release view "$TAG" --json isDraft --jq '.isDraft')" = "false"
          test "$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')" = "false"
          gh release view "$TAG" --json assets --jq '.assets[].name' | grep -Fx "$ASSET"
          rm -rf /tmp/card-release
          mkdir -p /tmp/card-release
          gh release download "$TAG" -p "$ASSET" -D /tmp/card-release --clobber
          cmp "$ASSET" "/tmp/card-release/$ASSET"
