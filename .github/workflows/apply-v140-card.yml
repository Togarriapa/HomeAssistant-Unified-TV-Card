name: Apply card 1.4 release

on:
  push:
    branches:
      - release/v1.4.0-backend-compatibility
    paths:
      - .github/workflows/apply-v140-card.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1.4.0-backend-compatibility
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply card release
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'Missing marker: {label}')
              return text.replace(old, new, 1)

          card_path = Path('HomeAssistant-Unified-TV-Card.js')
          card = card_path.read_text()
          card = replace_once(
              card,
              'const CARD_VERSION = "1.3.2";',
              'const CARD_VERSION = "1.4.0";',
              'card version',
          )
          card = replace_once(
              card,
              '    cardRelease: "Card release",\n',
              '    cardRelease: "Card release",\n'
              '    backendOutdated: "Backend 8.4.0 or newer is required. Installed backend: {version}.",\n',
              'English backend label',
          )
          card = replace_once(
              card,
              '    cardRelease: "Versão do cartão",\n',
              '    cardRelease: "Versão do cartão",\n'
              '    backendOutdated: "É necessária a integração 8.4.0 ou superior. Versão instalada: {version}.",\n',
              'Portuguese backend label',
          )
          card = replace_once(
              card,
              '''function cleanControllerTitle(value) {''',
              '''function versionAtLeast(value, minimum) {
            const parse = (input) => String(input ?? "")
              .replace(/^v/i, "")
              .split(".")
              .slice(0, 3)
              .map((part) => Number.parseInt(part, 10));
            const current = parse(value);
            const required = parse(minimum);
            if (current.length < 3 || current.some((part) => !Number.isFinite(part))) return false;
            for (let index = 0; index < 3; index += 1) {
              if (current[index] > required[index]) return true;
              if (current[index] < required[index]) return false;
            }
            return true;
          }

          function cleanControllerTitle(value) {'''.replace('          ', ''),
              'version comparator',
          )
          card = replace_once(
              card,
              '    const adEnabled = adState?.state === "on";\n',
              '    const adEnabled = adState?.state === "on";\n'
              '    const backendRelease = String(attrs.runtime_release ?? "");\n'
              '    const backendCompatible = versionAtLeast(backendRelease, "8.4.0");\n'
              '    const backendWarning = backendCompatible\n'
              '      ? ""\n'
              '      : labels.backendOutdated.replace("{version}", backendRelease || "unknown");\n'
              '    const manualAdSkipAvailable = attrs.manual_ad_skip_available === true;\n',
              'backend compatibility state',
          )
          card = replace_once(
              card,
              '''          </header>
                    ${this._notice ?'''.replace('          ', ''),
              '''          </header>
                    ${backendWarning ? `<div class="notice error">${escapeHtml(backendWarning)}</div>` : ""}
                    ${this._notice ?'''.replace('          ', ''),
              'compatibility warning',
          )
          old_ad = '''          ${adState ? `<section class="ad-skip-row"><button class="feature-toggle ${adEnabled ? "active" : ""}" data-action="toggle-ad-skip" aria-pressed="${adEnabled}" title="${escapeAttribute(labels.autoSkipAds)}"><ha-icon icon="mdi:advertisements-off"></ha-icon><span>${escapeHtml(labels.autoSkipAds)}</span><strong>${escapeHtml(adEnabled ? labels.on : labels.off)}</strong></button><button class="small-action" data-action="skip-ad-now"><ha-icon icon="mdi:skip-forward"></ha-icon><span>${escapeHtml(labels.skipNow)}</span></button></section>` : ""}'''.replace('          ', '')
          new_ad = '''          ${adState ? `<section class="ad-skip-row"><button class="feature-toggle ${adEnabled ? "active" : ""}" data-action="toggle-ad-skip" aria-pressed="${adEnabled}" title="${escapeAttribute(labels.autoSkipAds)}"><ha-icon icon="mdi:advertisements-off"></ha-icon><span>${escapeHtml(labels.autoSkipAds)}</span><strong>${escapeHtml(adEnabled ? labels.on : labels.off)}</strong></button>${manualAdSkipAvailable ? `<button class="small-action" data-action="skip-ad-now"><ha-icon icon="mdi:skip-forward"></ha-icon><span>${escapeHtml(labels.skipNow)}</span></button>` : ""}</section>` : ""}'''.replace('          ', '')
          card = replace_once(card, old_ad, new_ad, 'manual ad control')
          card_path.write_text(card)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package['version'] = '1.4.0'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text()
          entry = '''## 1.4.0

          - Added an explicit compatibility warning when the selected controller is not running Cast Metadata & TV Controls 8.4.0 or newer.
          - Hid the manual ad action unless the backend confirms a configured manual provider.
          - Preserved all existing card YAML, visual-editor options, dynamic applications, inputs, transport, volume, remote controls, artwork, activities, and diagnostics.
          - Added frontend regression checks for backend compatibility and release versioning.

          '''.replace('          ', '')
          if '## 1.4.0\n' not in changelog:
              changelog_path.write_text(changelog.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1))

          test_path = Path('tests/card_smoke.test.mjs')
          test = test_path.read_text()
          test = test.replace('1\\.3\\.2', '1\\.4\\.0')
          test = test.replace('1.3.2', '1.4.0')
          checks = '''
          assert.match(code, /versionAtLeast/);
          assert.match(code, /backendOutdated/);
          assert.match(code, /manual_ad_skip_available/);
          '''.replace('          ', '')
          if 'assert.match(code, /versionAtLeast/);' not in test:
              test += checks
          test_path.write_text(test)
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add HomeAssistant-Unified-TV-Card.js package.json CHANGELOG.md tests/card_smoke.test.mjs
          git commit -m 'Release Unified TV Card 1.4.0 compatibility checks'
          git push origin HEAD:release/v1.4.0-backend-compatibility
