name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "30 0 * * 0"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: hacs/action@main
        with:
          category: plugin
          ignore: brands description topics

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm run check
      - name: Validate package, HACS metadata, and version consistency
        run: |
          node <<'JS'
          const fs = require('fs');
          const packageData = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          JSON.parse(fs.readFileSync('hacs.json', 'utf8'));
          const source = fs.readFileSync('HomeAssistant-Unified-TV-Card.js', 'utf8');
          const match = source.match(/^const CARD_VERSION = "([0-9]+\.[0-9]+\.[0-9]+)";/m);
          if (!match) throw new Error('CARD_VERSION was not found');
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const heading = changelog.match(/^## ([0-9]+\.[0-9]+\.[0-9]+)$/m);
          if (!heading) throw new Error('CHANGELOG.md has no semantic-version heading');
          const versions = new Set([packageData.version, match[1], heading[1]]);
          if (versions.size !== 1) {
            throw new Error(`Version mismatch: ${[...versions].join(', ')}`);
          }
          JS
