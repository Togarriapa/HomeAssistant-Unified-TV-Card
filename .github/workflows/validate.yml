name: Validate

on:
  push:
  pull_request:

permissions: {}

jobs:
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - uses: hacs/action@main
        with:
          category: plugin
          ignore: brands description topics

  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node --check HomeAssistant-Unified-TV-Card.js
      - run: node -e "JSON.parse(require('fs').readFileSync('hacs.json')); JSON.parse(require('fs').readFileSync('package.json'))"
