name: Apply v1.3.1 card and HACS hotfix

on:
  push:
    branches:
      - fix/v1.3.1-runtime-hacs-hotfix
    paths:
      - .github/workflows/apply-v131-hotfix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/v1.3.1-runtime-hacs-hotfix
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply card hotfix
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_once(text: str, old: str, new: str) -> str:
              if old not in text:
                  raise SystemExit(f'Missing JavaScript marker: {old[:120]!r}')
              return text.replace(old, new, 1)

          js_path = Path('HomeAssistant-Unified-TV-Card.js')
          js = js_path.read_text()
          js = replace_once(js, 'const CARD_VERSION = "1.3.0";', 'const CARD_VERSION = "1.3.1";')
          js = replace_once(
              js,
              '    remoteUnavailable: "Android TV Remote is not linked to this controller",',
              '    remoteUnavailable: "No navigation provider is available. Configure the physical-device entities in the integration.",\n'
              '    navigationProvider: "Navigation provider", restartProvider: "Restart provider",\n'
              '    linkedEntities: "Linked entities", backendRelease: "Backend release", cardRelease: "Card release",',
          )
          js = replace_once(
              js,
              '    remoteUnavailable: "O Android TV Remote não está associado a este controlador",',
              '    remoteUnavailable: "Não existe um fornecedor de navegação. Configure as entidades do dispositivo físico na integração.",\n'
              '    navigationProvider: "Fornecedor de navegação", restartProvider: "Fornecedor de reinício",\n'
              '    linkedEntities: "Entidades associadas", backendRelease: "Versão da integração", cardRelease: "Versão do cartão",',
          )

          js = replace_once(
              js,
              '          { name: "show_artwork", selector: { boolean: {} } },\n'
              '          { name: "show_remote", selector: { boolean: {} } },',
              '          { name: "show_artwork", selector: { boolean: {} } },\n'
              '          { name: "show_apps", selector: { boolean: {} } },\n'
              '          { name: "show_inputs", selector: { boolean: {} } },\n'
              '          { name: "show_transport", selector: { boolean: {} } },\n'
              '          { name: "show_volume", selector: { boolean: {} } },\n'
              '          { name: "show_power", selector: { boolean: {} } },\n'
              '          { name: "show_restart", selector: { boolean: {} } },\n'
              '          { name: "show_remote", selector: { boolean: {} } },',
          )
          js = replace_once(
              js,
              '        show_artwork: "Show artwork", show_remote: "Show directional remote",',
              '        show_artwork: "Show artwork", show_apps: "Show application selector",\n'
              '        show_inputs: "Show input selector", show_transport: "Show playback controls",\n'
              '        show_volume: "Show volume controls", show_power: "Show power control",\n'
              '        show_restart: "Show restart control", show_remote: "Show directional remote",',
          )
          js = replace_once(
              js,
              '      show_artwork: true, show_remote: true, show_diagnostics: false,\n'
              '      show_favorites: true, show_activities: true, show_ad_skip: true,',
              '      show_artwork: true, show_apps: true, show_inputs: true,\n'
              '      show_transport: true, show_volume: true, show_power: true,\n'
              '      show_restart: true, show_remote: true, show_diagnostics: false,\n'
              '      show_favorites: true, show_activities: true, show_ad_skip: true,',
          )
          js = replace_once(
              js,
              '      show_artwork: true, show_remote: true, show_diagnostics: false,\n'
              '      show_favorites: true, show_activities: true, show_ad_skip: true,',
              '      show_artwork: true, show_apps: true, show_inputs: true,\n'
              '      show_transport: true, show_volume: true, show_power: true,\n'
              '      show_restart: true, show_remote: true, show_diagnostics: false,\n'
              '      show_favorites: true, show_activities: true, show_ad_skip: true,',
          )

          js = replace_once(
              js,
              '      attrs.remote_available, sourceArtwork,',
              '      attrs.remote_available, attrs.navigation_provider, attrs.restart_provider,\n'
              '      attrs.restart_available, attrs.linked_entities, attrs.application_providers,\n'
              '      attrs.runtime_release, sourceArtwork,',
          )
          js = replace_once(
              js,
              '    const remoteAvailable = attrs.remote_available !== false;\n'
              '    const favorites = this._favoriteSources(sourceApps, attrs.favorite_sources);',
              '    const remoteAvailable = attrs.remote_available === true;\n'
              '    const restartAvailable = attrs.restart_available === true || Boolean(attrs.restart_provider);\n'
              '    const favorites = this._favoriteSources(sourceApps, attrs.favorite_sources);',
          )
          js = replace_once(
              js,
              '          <div class="header-actions">${this._iconButton("restart", "mdi:restart", labels.restart)}${this._iconButton("power", "mdi:power", labels.power, isOff ? "accent" : "danger")}</div>',
              '          <div class="header-actions">${this._config.show_restart !== false && restartAvailable ? this._iconButton("restart", "mdi:restart", labels.restart) : ""}${this._config.show_power !== false ? this._iconButton("power", "mdi:power", labels.power, isOff ? "accent" : "danger") : ""}</div>',
          )
          js = replace_once(
              js,
              '        <section class="now-playing">\n'
              '          ${artwork ? `<div class="artwork" style="background-image:url(\'${escapeAttribute(artwork)}\')"></div>` : `<div class="artwork placeholder"><ha-icon icon="mdi:television-play"></ha-icon></div>`}',
              '        <section class="now-playing ${this._config.show_artwork === false ? "without-artwork" : ""}">\n'
              '          ${this._config.show_artwork === false ? "" : artwork ? `<div class="artwork" style="background-image:url(\'${escapeAttribute(artwork)}\')"></div>` : `<div class="artwork placeholder"><ha-icon icon="mdi:television-play"></ha-icon></div>`}',
          )
          js = replace_once(
              js,
              '        <section class="selectors">${this._appSelectBlock(appOptions, activeSource, labels)}${this._selectBlock("input-select", labels.input, labels.selectInput, inputs, activeSource)}</section>',
              '        ${this._config.show_apps !== false || this._config.show_inputs !== false ? `<section class="selectors">${this._config.show_apps !== false ? this._appSelectBlock(appOptions, activeSource, labels) : ""}${this._config.show_inputs !== false ? this._selectBlock("input-select", labels.input, labels.selectInput, inputs, activeSource) : ""}</section>` : ""}',
          )
          js = replace_once(
              js,
              '        <section class="transport">${this._iconButton("previous", "mdi:skip-previous", "Previous")}${this._iconButton("rewind", "mdi:rewind-10", `-${this._config.seek_seconds}s`)}${this._iconButton("play-pause", state.state === "playing" ? "mdi:pause" : "mdi:play", state.state === "playing" ? "Pause" : "Play", "primary big")}${this._iconButton("forward", "mdi:fast-forward-10", `+${this._config.seek_seconds}s`)}${this._iconButton("next", "mdi:skip-next", "Next")}</section>',
              '        ${this._config.show_transport !== false ? `<section class="transport">${this._iconButton("previous", "mdi:skip-previous", "Previous")}${this._iconButton("rewind", "mdi:rewind-10", `-${this._config.seek_seconds}s`)}${this._iconButton("play-pause", state.state === "playing" ? "mdi:pause" : "mdi:play", state.state === "playing" ? "Pause" : "Play", "primary big")}${this._iconButton("forward", "mdi:fast-forward-10", `+${this._config.seek_seconds}s`)}${this._iconButton("next", "mdi:skip-next", "Next")}</section>` : ""}',
          )
          js = replace_once(
              js,
              '        <section class="volume-row">\n'
              '          <button class="icon-button mute ${muted ? "active" : ""}" data-action="mute" title="${escapeAttribute(muted ? labels.unmute : labels.mute)}" aria-label="${escapeAttribute(muted ? labels.unmute : labels.mute)}"><ha-icon icon="${muted ? "mdi:volume-off" : volume > 55 ? "mdi:volume-high" : "mdi:volume-medium"}"></ha-icon></button>\n'
              '          <input id="volume" type="range" min="0" max="100" step="1" value="${volume}" aria-label="${escapeAttribute(labels.volume)}" /><span class="volume-value">${volume}%</span>\n'
              '        </section>',
              '        ${this._config.show_volume !== false ? `<section class="volume-row">\n'
              '          <button class="icon-button mute ${muted ? "active" : ""}" data-action="mute" title="${escapeAttribute(muted ? labels.unmute : labels.mute)}" aria-label="${escapeAttribute(muted ? labels.unmute : labels.mute)}"><ha-icon icon="${muted ? "mdi:volume-off" : volume > 55 ? "mdi:volume-high" : "mdi:volume-medium"}"></ha-icon></button>\n'
              '          <input id="volume" type="range" min="0" max="100" step="1" value="${volume}" aria-label="${escapeAttribute(labels.volume)}" /><span class="volume-value">${volume}%</span>\n'
              '        </section>` : ""}',
          )

          js = replace_once(
              js,
              '.filter((item) => item && item.visible !== false && ["tv_app", "cast_app"].includes(String(item.kind)))',
              '.filter((item) => item && item.visible !== false && ["tv_app", "cast_app", "adb_app", "native_source", "generic_app"].includes(String(item.kind)))',
          )
          js = replace_once(
              js,
              '       if (action.kind === "tv_app") await this._call("cast_attribute_sensors", "launch_tv_app", { entity_id: entityId, app_id: action.appId });',
              '       if (["tv_app", "adb_app", "native_source", "generic_app"].includes(action.kind)) await this._call("cast_attribute_sensors", "launch_tv_app", { entity_id: entityId, app_id: action.appId });',
          )
          js = replace_once(
              js,
              '<dt>${escapeHtml(labels.features)}</dt><dd>${escapeHtml(attrs.supported_features ?? 0)}</dd>',
              '<dt>${escapeHtml(labels.navigationProvider)}</dt><dd>${escapeHtml(attrs.navigation_provider || "—")}</dd><dt>${escapeHtml(labels.restartProvider)}</dt><dd>${escapeHtml(attrs.restart_provider || "—")}</dd><dt>${escapeHtml(labels.linkedEntities)}</dt><dd>${escapeHtml(Array.isArray(attrs.linked_entities) && attrs.linked_entities.length ? attrs.linked_entities.join(", ") : "—")}</dd><dt>${escapeHtml(labels.backendRelease)}</dt><dd>${escapeHtml(attrs.runtime_release || "—")}</dd><dt>${escapeHtml(labels.cardRelease)}</dt><dd>${escapeHtml(CARD_VERSION)}</dd><dt>${escapeHtml(labels.features)}</dt><dd>${escapeHtml(attrs.supported_features ?? 0)}</dd>',
          )
          js = replace_once(
              js,
              '.now-playing{display:grid;grid-template-columns:86px minmax(0,1fr);gap:14px;align-items:center;min-width:0}',
              '.now-playing{display:grid;grid-template-columns:86px minmax(0,1fr);gap:14px;align-items:center;min-width:0}.now-playing.without-artwork{grid-template-columns:minmax(0,1fr)}',
          )

          js_path.write_text(js)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package['version'] = '1.3.1'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text()
          entry = '''## 1.3.1

          - Added working visibility controls for applications, inputs, transport, volume, power and restart.
          - Fixed `show_artwork: false` so the artwork block is removed instead of replaced by a placeholder.
          - Consumed generic native application kinds from backend 8.3.1 and routed them through the generic launch service.
          - Stopped rendering a dead directional remote unless the backend confirms a navigation provider.
          - Added provider, linked-entity and backend/card version diagnostics.
          - Replaced Android-TV-specific wording and verified the exact HACS JavaScript release asset after publication.
          - Preserved all existing YAML options and defaults.

          '''.replace('          ', '')
          if '## 1.3.1\n' not in changelog:
              changelog_path.write_text(
                  changelog.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1)
              )

          readme_path = Path('README.md')
          readme = readme_path.read_text().replace('1.3.0', '1.3.1').replace('8.3.0', '8.3.1')
          readme_path.write_text(readme)

          test_path = Path('tests/card_smoke.test.mjs')
          test = test_path.read_text()
          addition = '''
          const formNames = Card.getConfigForm().schema
            .flatMap((item) => item.schema ?? [item])
            .map((item) => item.name)
            .filter(Boolean);
          for (const name of ["show_apps", "show_inputs", "show_transport", "show_volume", "show_power", "show_restart"]) {
            assert.ok(formNames.includes(name), `${name} must be editable`);
          }
          assert.match(code, /show_artwork === false \? ""/);
          assert.match(code, /remote_available === true/);
          assert.match(code, /generic_app/);
          assert.match(code, /navigation_provider/);
          assert.doesNotMatch(code, /Android TV Remote is not linked/);
          assert.match(code, /const CARD_VERSION = "1\.3\.1"/);
          '''.replace('          ', '')
          if 'show_apps must be editable' not in test:
              test_path.write_text(test.rstrip() + '\n' + addition)

          Path('.github/workflows/release.yml').write_text('''name: Publish release

          on:
            push:
              branches: [main]
              paths:
                - HomeAssistant-Unified-TV-Card.js
                - package.json
                - CHANGELOG.md
                - hacs.json
                - .github/workflows/release.yml
            schedule:
              - cron: "41 3 * * *"
            workflow_dispatch:

          concurrency:
            group: publish-unified-tv-card-release
            cancel-in-progress: false

          permissions:
            contents: write

          jobs:
            release:
              runs-on: ubuntu-latest
              timeout-minutes: 10
              steps:
                - uses: actions/checkout@v4
                  with:
                    fetch-depth: 0
                - uses: actions/setup-node@v4
                  with:
                    node-version: "22"
                - name: Verify version consistency
                  id: version
                  run: |
                    node <<'JS' >> "$GITHUB_OUTPUT"
                    const fs = require('fs');
                    const packageData = JSON.parse(fs.readFileSync('package.json', 'utf8'));
                    const hacs = JSON.parse(fs.readFileSync('hacs.json', 'utf8'));
                    const source = fs.readFileSync('HomeAssistant-Unified-TV-Card.js', 'utf8');
                    const sourceMatch = source.match(/^const CARD_VERSION = "([0-9]+\.[0-9]+\.[0-9]+)";/m);
                    const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
                    const heading = changelog.match(/^## ([0-9]+\.[0-9]+\.[0-9]+)$/m);
                    if (!sourceMatch || !heading) throw new Error('Version metadata is incomplete');
                    const versions = new Set([packageData.version, sourceMatch[1], heading[1]]);
                    if (versions.size !== 1) throw new Error(`Version mismatch: ${[...versions].join(', ')}`);
                    if (hacs.filename !== 'HomeAssistant-Unified-TV-Card.js') throw new Error('Unexpected HACS filename');
                    console.log(`version=${packageData.version}`);
                    console.log(`tag=v${packageData.version}`);
                    console.log(`asset=${hacs.filename}`);
                    JS
                - name: Publish or repair GitHub release
                  env:
                    GH_TOKEN: ${{ github.token }}
                    TAG: ${{ steps.version.outputs.tag }}
                    VERSION: ${{ steps.version.outputs.version }}
                    ASSET: ${{ steps.version.outputs.asset }}
                  run: |
                    set -euo pipefail
                    git config user.name "github-actions[bot]"
                    git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                    if ! git rev-parse --verify "refs/tags/$TAG" >/dev/null 2>&1; then
                      git tag -a "$TAG" -m "Unified TV Card $VERSION"
                      git push origin "$TAG"
                    fi
                    awk -v version="$VERSION" '
                      $0 == "## " version {flag=1; next}
                      /^## / && flag {exit}
                      flag
                    ' CHANGELOG.md > release-notes.md
                    if [[ ! -s release-notes.md ]]; then
                      printf 'Unified TV Card %s\n' "$VERSION" > release-notes.md
                    fi
                    if gh release view "$TAG" >/dev/null 2>&1; then
                      gh release edit "$TAG" --draft=false --prerelease=false --latest \
                        --title "Unified TV Card $VERSION"
                      gh release upload "$TAG" "$ASSET" --clobber
                    else
                      gh release create "$TAG" "$ASSET" \
                        --target "$GITHUB_SHA" \
                        --title "Unified TV Card $VERSION" \
                        --notes-file release-notes.md \
                        --verify-tag \
                        --latest
                    fi
                    test "$(gh release view "$TAG" --json assets --jq '.assets[] | select(.name == env.ASSET) | .name')" = "$ASSET"
                    rm -rf /tmp/card-release && mkdir -p /tmp/card-release
                    gh release download "$TAG" -p "$ASSET" -D /tmp/card-release --clobber
                    cmp "$ASSET" "/tmp/card-release/$ASSET"
          '''.replace('          ', ''))

          Path('.github/workflows/apply-v131-hotfix.yml').unlink()
          PY
      - name: Commit hotfix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Release v1.3.1 card and HACS hotfix'
          git push origin HEAD:fix/v1.3.1-runtime-hacs-hotfix
