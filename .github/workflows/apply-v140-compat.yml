name: Apply card 1.4 compatibility guard

on:
  push:
    branches:
      - release/v1.4.0-backend-compatibility
    paths:
      - .github/workflows/apply-v140-compat.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/v1.4.0-backend-compatibility
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Apply compatibility guard
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'Missing marker: {label}')
              return text.replace(old, new, 1)

          card_path = Path('HomeAssistant-Unified-TV-Card.js')
          card = card_path.read_text()

          if 'backendOutdated:' not in card:
              card = replace_once(
                  card,
                  '    cardRelease: "Card release",\n',
                  '    cardRelease: "Card release",\n'
                  '    backendOutdated: "Backend 8.4.0 or newer is required. Installed backend: {version}.",\n',
                  'English compatibility label',
              )
              card = replace_once(
                  card,
                  '    cardRelease: "Versão do cartão",\n',
                  '    cardRelease: "Versão do cartão",\n'
                  '    backendOutdated: "É necessária a integração 8.4.0 ou superior. Versão instalada: {version}.",\n',
                  'Portuguese compatibility label',
              )

          if 'function versionAtLeast(' not in card:
              helper = '''function versionAtLeast(value, minimum) {
            const parse = (input) => String(input ?? "")
              .replace(/^v/i, "")
              .split(".")
              .slice(0, 3)
              .map((part) => Number.parseInt(part, 10));
            const current = parse(value);
            const required = parse(minimum);
            if (current.length < 3 || current.some((part) => !Number.isFinite(part))) return false;
            for (let index = 0; index < 3; index += 1) {
              if (current[index] > required[index]) return true;
              if (current[index] < required[index]) return false;
            }
            return true;
          }

          '''.replace('          ', '')
              card = replace_once(
                  card,
                  'function cleanControllerTitle(value) {',
                  helper + 'function cleanControllerTitle(value) {',
                  'version comparator',
              )

          if 'const backendCompatible = versionAtLeast' not in card:
              card = replace_once(
                  card,
                  '    const adEnabled = adState?.state === "on";\n',
                  '    const adEnabled = adState?.state === "on";\n'
                  '    const backendRelease = String(attrs.runtime_release ?? "");\n'
                  '    const backendCompatible = versionAtLeast(backendRelease, "8.4.0");\n'
                  '    const backendWarning = backendCompatible\n'
                  '      ? ""\n'
                  '      : labels.backendOutdated.replace("{version}", backendRelease || "unknown");\n'
                  '    const manualAdSkipAvailable = attrs.manual_ad_skip_available === true;\n',
                  'compatibility state',
              )

          if '${backendWarning ?' not in card:
              card = replace_once(
                  card,
                  '          ${this._notice ? `<div class="notice ${escapeAttribute(this._notice.type)}">',
                  '          ${backendWarning ? `<div class="notice error">${escapeHtml(backendWarning)}</div>` : ""}\n'
                  '          ${this._notice ? `<div class="notice ${escapeAttribute(this._notice.type)}">',
                  'compatibility warning',
              )

          old_ad = '${adState ? `<section class="ad-skip-row"><button class="feature-toggle ${adEnabled ? "active" : ""}" data-action="toggle-ad-skip" aria-pressed="${adEnabled}" title="${escapeAttribute(labels.autoSkipAds)}"><ha-icon icon="mdi:advertisements-off"></ha-icon><span>${escapeHtml(labels.autoSkipAds)}</span><strong>${escapeHtml(adEnabled ? labels.on : labels.off)}</strong></button><button class="small-action" data-action="skip-ad-now"><ha-icon icon="mdi:skip-forward"></ha-icon><span>${escapeHtml(labels.skipNow)}</span></button></section>` : ""}'
          new_ad = '${adState ? `<section class="ad-skip-row"><button class="feature-toggle ${adEnabled ? "active" : ""}" data-action="toggle-ad-skip" aria-pressed="${adEnabled}" title="${escapeAttribute(labels.autoSkipAds)}"><ha-icon icon="mdi:advertisements-off"></ha-icon><span>${escapeHtml(labels.autoSkipAds)}</span><strong>${escapeHtml(adEnabled ? labels.on : labels.off)}</strong></button>${manualAdSkipAvailable ? `<button class="small-action" data-action="skip-ad-now"><ha-icon icon="mdi:skip-forward"></ha-icon><span>${escapeHtml(labels.skipNow)}</span></button>` : ""}</section>` : ""}'
          if 'manualAdSkipAvailable ? `<button class="small-action"' not in card:
              card = replace_once(card, old_ad, new_ad, 'manual action visibility')

          card_path.write_text(card)

          package_path = Path('package.json')
          package = json.loads(package_path.read_text())
          package['version'] = '1.4.0'
          package_path.write_text(json.dumps(package, indent=2) + '\n')

          changelog_path = Path('CHANGELOG.md')
          changelog = changelog_path.read_text()
          if '## 1.4.0\n' not in changelog:
              entry = '''## 1.4.0

          - Added an explicit compatibility warning when the selected controller is not running Cast Metadata & TV Controls 8.4.0 or newer.
          - Hid the manual ad action unless the backend confirms a configured manual provider.
          - Preserved existing YAML, visual-editor options, dynamic applications, inputs, transport, volume, remote controls, artwork, activities, and diagnostics.
          - Added frontend regression checks for backend compatibility and release versioning.

          '''.replace('          ', '')
              changelog_path.write_text(
                  changelog.replace('# Changelog\n\n', '# Changelog\n\n' + entry, 1)
              )

          test_path = Path('tests/card_smoke.test.mjs')
          test = test_path.read_text().replace('1\\.3\\.2', '1\\.4\\.0').replace('1.3.2', '1.4.0')
          if 'assert.match(code, /versionAtLeast/);' not in test:
              test += '\nassert.match(code, /versionAtLeast/);\n'
              test += 'assert.match(code, /backendOutdated/);\n'
              test += 'assert.match(code, /manual_ad_skip_available/);\n'
          test_path.write_text(test)
          PY
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add HomeAssistant-Unified-TV-Card.js package.json CHANGELOG.md tests/card_smoke.test.mjs
          git commit -m 'Add Unified TV Card 1.4 backend compatibility guard'
          git push origin HEAD:release/v1.4.0-backend-compatibility
